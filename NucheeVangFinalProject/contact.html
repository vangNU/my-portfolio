<!DOCTYPE html>
<html>
    <head>
        <title>Contact</title>
        <link rel="stylesheet" href="style.css">
        
        <script>
            function changeBackground() {
                var color = document.getElementById("color").value;
                document.body.style.backgroundColor = color;
            }

            function submitForm() {
                var name = document.getElementById("name").value;
                document.getElementById("message").innerHTML =
                    "Thanks for visiting, " + name + "!";
            }
        </script>
    </head>
    
    <body>
        <div class="container">
            <nav>
                <a href="index.html">Home</a> |
                <a href="images.html">Luna</a> |
                <a href="images2.html">Sheik</a> |
                <a href="images3.html">Snowball</a> |
                <a href="about.html">About</a> |
            </nav>
        
            <h2>Contact / Interaction Page</h2>
            <form>
                Name: <input type="text" id="name"><br><br>

                Favorite Color:
                <input type="color" id="color"><br><br>
                <button class="bubble-btn" type="button" onclick="changeBackground()">
                    Change Background
                </button>

                <button class="bubble-btn" type="button" onclick="submitForm()">
                    Submit
                </button>
            </form>
        
            <p id="message"></p>
        </div>
    </body>
</html>
