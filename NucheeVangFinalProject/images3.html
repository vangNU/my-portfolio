<!DOCTYPE html>
<html>
    <head>
        <title>Snowball</title>
        <link rel="stylesheet" href="style.css">

        <script>
            var images = ["Snowball.jpg", "Snowball2.jpg", "Snowball3.jpg"];
            var index = 0;

            function showImage() {
                document.getElementById("galleryImage").src = images[index];
            }

            function nextImage() {
                index++;
                if (index >= images.length) {
                    index = 0;
                }
                showImage();
            }

            function prevImage() {
                index--;
                if (index < 0) {
                    index = images.length - 1;
                }
                showImage();
            }
        </script>
    </head>

    <body>
        <div class="container">

            <nav>
                <a href="index.html">Home</a> |
                <a href="images.html">Luna</a> |
                <a href="images2.html">Sheik</a> |
                <a href="about.html">About</a> |
                <a href="contact.html">Contact</a>
            </nav>

            <h2>Hi, I'm Snowball!</h2>

            <!-- GALLERY -->
            <div class="gallery">                
                <button onclick="prevImage()">Previous</button>
                <button onclick="nextImage()">Next</button>

                <br>

                <img id="galleryImage" src="Snowball.jpg" alt="Snowball" width="400">
            </div>

            <ul>
                <li>Personality
                    <ul>
                        <li>Cuddly</li>
                        <li>Shy</li>
                        <li>Scaredy cat</li>
                    </ul>
                </li>
            </ul>

        </div>
    </body>
</html>
